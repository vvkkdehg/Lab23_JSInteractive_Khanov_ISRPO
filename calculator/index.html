<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль пользователя</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Профиль пользователя</h1>
        
        <form id="profileForm">
            <div class="form-group">
                <label for="name">Имя:</label>
                <input type="text" id="name" placeholder="Введите имя">
                <div class="error" id="nameError">Пожалуйста, введите имя</div>
            </div>

            <div class="form-group">
                <label for="age">Возраст:</label>
                <input type="number" id="age" placeholder="Введите возраст">
                <div class="error" id="ageError">Пожалуйста, введите возраст</div>
            </div>

            <div class="form-group">
                <label for="city">Город:</label>
                <input type="text" id="city" placeholder="Введите город">
                <div class="error" id="cityError">Пожалуйста, введите город</div>
            </div>

            <div class="form-group">
                <label for="hobby">Хобби:</label>
                <input type="text" id="hobby" placeholder="Введите хобби">
                <div class="error" id="hobbyError">Пожалуйста, введите хобби</div>
            </div>

            <button type="submit" class="btn">Сохранить профиль</button>
            <button type="button" class="btn btn-clear" id="clearBtn">Очистить данные</button>
        </form>

        <div class="profile-card" id="profileCard">
            <h3>Информация о пользователе</h3>
            <p><strong>Имя:</strong> <span id="displayName"></span></p>
            <p><strong>Возраст:</strong> <span id="displayAge"></span></p>
            <p><strong>Город:</strong> <span id="displayCity"></span></p>
            <p><strong>Хобби:</strong> <span id="displayHobby"></span></p>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
